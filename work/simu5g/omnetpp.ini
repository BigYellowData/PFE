# ==============================================================
# omnetpp.ini - Configuration simu5G pour Network Slicing
# PFE : Prédiction de trafic 5G pour éviter les violations SLA
#
# 3 slices configurés avec QoS différenciée :
#   - eMBB  (SST=1) : Cloud gaming vidéo, haut débit
#   - URLLC (SST=2) : Contrôle temps-réel, faible latence
#   - mMTC  (SST=3) : Signalisation admin, faible volume
#   - Best Effort    : Trafic non classifié
# ==============================================================

[General]
network = NetworkSlicing
sim-time-limit = 300s
seed-set = ${runnumber}

# --- Enregistrement des resultats ---
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec
output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca

# Desactiver les statistiques problematiques MAC
**.mac.receivedPacketFromLowerLayer.result-recording-modes = -
**.mac.receivedPacketFromUpperLayer.result-recording-modes = -
**.mac.sentPacketToLowerLayer.result-recording-modes = -
**.mac.sentPacketToUpperLayer.result-recording-modes = -

# Activer les metriques importantes pour SLA
**.app[*].**.vector-recording = true
**.app[*].**.scalar-recording = true
**.endToEndDelay.vector-recording = true
**.throughput.vector-recording = true
**.vector-recording = false
**.scalar-recording = true

# Intervalle d'echantillonnage pour les vecteurs (1 seconde)
**.app[*].throughput.result-recording-modes = +vector
**.app[*].endToEndDelay.result-recording-modes = +vector

# ==============================================================
# CONFIGURATION RADIO 5G NR
# ==============================================================

# Bande passante 5G NR : 100 MHz en bande n78 (3.5 GHz)
*.gnb.cellularNic.phy.carrierFrequency = 3.5GHz
*.gnb.cellularNic.phy.numBands = 50
*.gnb.cellularNic.phy.txPower = 40dBm

# Scheduler : Proportional Fair (bon compromis débit/équité)
*.gnb.cellularNic.mac.schedulingDisciplineDl = "MAXCI"
*.gnb.cellularNic.mac.schedulingDisciplineUl = "MAXCI"

# ==============================================================
# NETWORK SLICING - QoS par slice (3GPP TS 23.501)
# ==============================================================

# --- Slice eMBB (SST=1, SD=1) ---
# Priorité basse, gros débit, tolérance latence 50ms
*.gnb.cellularNic.mac.qosHandler.slicing = true
*.ueEmbb[*].cellularNic.nrSliceId = 1
*.ueEmbb[*].masterId = 1
*.ueEmbb[*].macCellId = 1

# --- Slice URLLC (SST=2, SD=1) ---
# Priorité haute, faible latence (<10ms), reliability 99.999%
*.ueUrllc[*].cellularNic.nrSliceId = 2
*.ueUrllc[*].masterId = 1
*.ueUrllc[*].macCellId = 1

# --- Slice mMTC (SST=3, SD=1) ---
# Priorité basse, faible volume, tolérance latence 100ms
*.ueMmtc[*].cellularNic.nrSliceId = 3
*.ueMmtc[*].masterId = 1
*.ueMmtc[*].macCellId = 1

# --- Best Effort ---
*.ueBestEffort[*].cellularNic.nrSliceId = 4
*.ueBestEffort[*].masterId = 1
*.ueBestEffort[*].macCellId = 1

# ==============================================================
# ALLOCATION DE RESSOURCES PAR SLICE
# ==============================================================
# Répartition des Resource Blocks (RB) entre slices
# Total : 50 RBs (100 MHz)

*.gnb.cellularNic.mac.sliceConfig = xmldoc("sliceConfig.xml")

# ==============================================================
# APPLICATIONS - Trafic UPLINK (UE -> Serveur) pour traverser la radio 5G
# ==============================================================

# --- eMBB : Upload video haute bande passante ---
# UEs eMBB envoient vers le serveur (traverse gNodeB)
*.ueEmbb[*].numApps = 1
*.ueEmbb[*].app[0].typename = "UdpBasicApp"
*.ueEmbb[*].app[0].destAddresses = "serverEmbb"
*.ueEmbb[*].app[0].destPort = 49005
*.ueEmbb[*].app[0].localPort = 10000
*.ueEmbb[*].app[0].messageLength = 1400B
*.ueEmbb[*].app[0].sendInterval = exponential(0.001s)
*.ueEmbb[*].app[0].startTime = uniform(0s, 1s)

# Serveur eMBB recoit et mesure endToEndDelay
*.serverEmbb.numApps = 1
*.serverEmbb.app[0].typename = "UdpBasicApp"
*.serverEmbb.app[0].localPort = 49005
*.serverEmbb.app[0].destAddresses = ""
*.serverEmbb.app[0].destPort = 0
*.serverEmbb.app[0].sendInterval = 0s
*.serverEmbb.app[0].messageLength = 0B

# --- URLLC : Trafic temps-reel faible latence ---
*.ueUrllc[*].numApps = 1
*.ueUrllc[*].app[0].typename = "UdpBasicApp"
*.ueUrllc[*].app[0].destAddresses = "serverUrllc"
*.ueUrllc[*].app[0].destPort = 49003
*.ueUrllc[*].app[0].localPort = 10001
*.ueUrllc[*].app[0].messageLength = 200B
*.ueUrllc[*].app[0].sendInterval = exponential(0.005s)
*.ueUrllc[*].app[0].startTime = uniform(0s, 0.5s)

*.serverUrllc.numApps = 1
*.serverUrllc.app[0].typename = "UdpBasicApp"
*.serverUrllc.app[0].localPort = 49003
*.serverUrllc.app[0].destAddresses = ""
*.serverUrllc.app[0].destPort = 0
*.serverUrllc.app[0].sendInterval = 0s
*.serverUrllc.app[0].messageLength = 0B

# --- mMTC : Signalisation IoT faible volume ---
*.ueMmtc[*].numApps = 1
*.ueMmtc[*].app[0].typename = "UdpBasicApp"
*.ueMmtc[*].app[0].destAddresses = "serverMmtc"
*.ueMmtc[*].app[0].destPort = 8443
*.ueMmtc[*].app[0].localPort = 10002
*.ueMmtc[*].app[0].messageLength = 100B
*.ueMmtc[*].app[0].sendInterval = exponential(1s)
*.ueMmtc[*].app[0].startTime = uniform(0s, 5s)

*.serverMmtc.numApps = 1
*.serverMmtc.app[0].typename = "UdpBasicApp"
*.serverMmtc.app[0].localPort = 8443
*.serverMmtc.app[0].destAddresses = ""
*.serverMmtc.app[0].destPort = 0
*.serverMmtc.app[0].sendInterval = 0s
*.serverMmtc.app[0].messageLength = 0B

# --- Best Effort : Trafic non prioritaire ---
*.ueBestEffort[*].numApps = 1
*.ueBestEffort[*].app[0].typename = "UdpBasicApp"
*.ueBestEffort[*].app[0].destAddresses = "serverBestEffort"
*.ueBestEffort[*].app[0].destPort = 5000
*.ueBestEffort[*].app[0].localPort = 10003
*.ueBestEffort[*].app[0].messageLength = 512B
*.ueBestEffort[*].app[0].sendInterval = exponential(0.1s)
*.ueBestEffort[*].app[0].startTime = uniform(0s, 2s)

*.serverBestEffort.numApps = 1
*.serverBestEffort.app[0].typename = "UdpBasicApp"
*.serverBestEffort.app[0].localPort = 5000
*.serverBestEffort.app[0].destAddresses = ""
*.serverBestEffort.app[0].destPort = 0
*.serverBestEffort.app[0].sendInterval = 0s
*.serverBestEffort.app[0].messageLength = 0B

# ==============================================================
# SCENARIOS DE CHARGE (pour générer des violations SLA)
# ==============================================================

# Scénario par défaut : charge normale (4 eMBB, 4 URLLC, 2 mMTC, 2 BE)
[Config Normal]
*.numEmbbUes = 4
*.numUrllcUes = 4
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 600s

# Scénario surcharge eMBB : 12 UEs video -> violations SLA eMBB
[Config OverloadEmbb]
*.numEmbbUes = 12
*.numUrllcUes = 4
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 600s

# Scénario surcharge URLLC : 12 UEs temps-reel -> violations latence URLLC
[Config OverloadUrllc]
*.numEmbbUes = 4
*.numUrllcUes = 12
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 600s

# Scénario mixte : surcharge générale -> violations sur tous les slices
[Config OverloadAll]
*.numEmbbUes = 10
*.numUrllcUes = 10
*.numMmtcUes = 6
*.numBestEffortUes = 6
sim-time-limit = 600s
