# ------------------------------------------------------------------------------
# SCÉNARIO 11 : SLABoundary_URLLC — Charge exactement au seuil SLA URLLC
# ------------------------------------------------------------------------------
# Cas de test critique : le modèle doit détecter la violation AVANT qu'elle
# soit certaine. Charge volontairement au bord du précipice.
# Résultat attendu : violation URLLC intermittente (difficile à prédire = utile ML)
# ------------------------------------------------------------------------------
[Config SLABoundary_URLLC]
description = "Charge au seuil SLA URLLC — violations intermittentes, cas difficile ML"
sim-time-limit = 1800s

*.numEmbbUes_A  = 4
*.numUrllcUes_A = 8    # précisément au seuil de saturation URLLC
*.numMmtcUes_A  = 2
*.ueEmbb_A[*].app[0].samplingTime  = 0.003s
*.ueUrllc_A[*].app[0].packetSize   = 200B
*.ueUrllc_A[*].app[0].samplingTime = 0.008s  # ~0.5 Mbps/UE = exactement SLA min
*.ueMmtc_A[*].app[0].samplingTime  = 1s

*.numEmbbUes_B  = 6
*.numUrllcUes_B = 4    # limite micro-cellule Commerce
*.numMmtcUes_B  = 1
*.ueEmbb_B[*].app[0].samplingTime  = 0.003s
*.ueUrllc_B[*].app[0].packetSize   = 200B
*.ueUrllc_B[*].app[0].samplingTime = 0.008s
*.ueMmtc_B[*].app[0].samplingTime  = 2s

*.numEmbbUes_C  = 2
*.numUrllcUes_C = 6    # seuil industrie
*.numMmtcUes_C  = 6
*.ueEmbb_C[*].app[0].samplingTime  = 0.004s
*.ueUrllc_C[*].app[0].packetSize   = 292B
*.ueUrllc_C[*].app[0].samplingTime = 0.009s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

# ==============================================================================
# GROUPE 4 — HÉTÉROGÉNÉITÉ (FONDEMENT DU FDL)
# Ces scénarios créent des distributions très différentes par cellule.
# C'est exactement le cas d'usage qui justifie l'apprentissage fédéré.
# Réf: Zhao et al. "Federated Learning with Non-IID Data", 2018
# ==============================================================================

# ------------------------------------------------------------------------------
# SCÉNARIO 12 : HetLoad_Asymmetric_A — Macro en crise, autres normaux
# ------------------------------------------------------------------------------
[Config HetLoad_Asymmetric_A]
description = "Charge asymetrique — Macro surchargee, Commerce et Industrie normaux (FDL non-IID)"
# Fix : cellules normales B et C passent de 0.004s → 0.020s (sinon eMBB Commerce ~62%)
sim-time-limit = 1800s

*.numEmbbUes_A  = 14
*.numUrllcUes_A = 16
*.numMmtcUes_A  = 8
*.ueEmbb_A[*].app[0].samplingTime  = 0.001s
*.ueUrllc_A[*].app[0].samplingTime = 0.004s
*.ueMmtc_A[*].app[0].samplingTime  = 0.3s

*.numEmbbUes_B  = 6
*.numUrllcUes_B = 2
*.numMmtcUes_B  = 1
*.ueEmbb_B[*].app[0].samplingTime  = 0.020s   # corrige : 0.004s causait 62% loss Commerce
*.ueUrllc_B[*].app[0].samplingTime = 0.010s
*.ueMmtc_B[*].app[0].samplingTime  = 2s

*.numEmbbUes_C  = 2
*.numUrllcUes_C = 4
*.numMmtcUes_C  = 6
*.ueEmbb_C[*].app[0].samplingTime  = 0.020s   # corrige : 0.004s → normal
*.ueUrllc_C[*].app[0].samplingTime = 0.010s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

# ------------------------------------------------------------------------------
# SCÉNARIO 13 : HetLoad_Asymmetric_B — Commerce en crise, autres normaux
# ------------------------------------------------------------------------------
[Config HetLoad_Asymmetric_B]
description = "Charge asymetrique — Commerce saturee, Macro et Industrie normaux (FDL non-IID)"
sim-time-limit = 1800s

*.numEmbbUes_A  = 4
*.numUrllcUes_A = 4
*.numMmtcUes_A  = 2
*.ueEmbb_A[*].app[0].samplingTime  = 0.020s   # Macro normal (ne surcharge pas)
*.ueUrllc_A[*].app[0].samplingTime = 0.010s
*.ueMmtc_A[*].app[0].samplingTime  = 1s

*.numEmbbUes_B  = 18   # très forte saturation Commerce
*.numUrllcUes_B = 10
*.numMmtcUes_B  = 4
*.ueEmbb_B[*].app[0].packetSize   = 1400B
*.ueEmbb_B[*].app[0].samplingTime = 0.001s
*.ueUrllc_B[*].app[0].samplingTime = 0.004s
*.ueMmtc_B[*].app[0].samplingTime  = 0.5s

*.numEmbbUes_C  = 2
*.numUrllcUes_C = 4
*.numMmtcUes_C  = 6
*.ueEmbb_C[*].app[0].samplingTime  = 0.020s   # corrige : 0.004s → normal
*.ueUrllc_C[*].app[0].samplingTime = 0.010s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

# ------------------------------------------------------------------------------
# SCÉNARIO 14 : HetLoad_Asymmetric_C — Industrie en crise, autres normaux
# ------------------------------------------------------------------------------
[Config HetLoad_Asymmetric_C]
description = "Charge asymetrique — Industrie en crise, Macro et Commerce normaux (FDL non-IID)"
sim-time-limit = 1800s

*.numEmbbUes_A  = 4
*.numUrllcUes_A = 4
*.numMmtcUes_A  = 2
*.ueEmbb_A[*].app[0].samplingTime  = 0.020s   # Macro normal
*.ueUrllc_A[*].app[0].samplingTime = 0.010s
*.ueMmtc_A[*].app[0].samplingTime  = 1s

*.numEmbbUes_B  = 6
*.numUrllcUes_B = 2
*.numMmtcUes_B  = 1
*.ueEmbb_B[*].app[0].samplingTime  = 0.020s   # corrige : 0.004s → normal
*.ueUrllc_B[*].app[0].samplingTime = 0.010s
*.ueMmtc_B[*].app[0].samplingTime  = 2s

*.numEmbbUes_C  = 2
*.numUrllcUes_C = 18   # industrie en crise totale
*.numMmtcUes_C  = 20
*.ueEmbb_C[*].app[0].samplingTime  = 0.003s
*.ueUrllc_C[*].app[0].packetSize   = 292B
*.ueUrllc_C[*].app[0].samplingTime = 0.003s
*.ueMmtc_C[*].app[0].packetSize    = 100B
*.ueMmtc_C[*].app[0].samplingTime  = 0.1s

# ------------------------------------------------------------------------------
# SCÉNARIO 15 : HetLoad_FullDiversity — 3 profils différents simultanément
# ------------------------------------------------------------------------------
# Scénario d'hétérogénéité maximale : Macro normal, Commerce eMBB élevé,
# Industrie URLLC élevé. Cas le plus représentatif de la réalité HetNet.
# Idéal pour évaluer FedAvg sur données non-IID (Zhao et al. 2018)
# ------------------------------------------------------------------------------
[Config HetLoad_FullDiversity]
description = "Heterogeneite maximale — 3 profils distincts simultanes (cas d usage FDL)"
sim-time-limit = 1800s

# Macro : charge normale équilibrée
*.numEmbbUes_A  = 4
*.numUrllcUes_A = 4
*.numMmtcUes_A  = 2
*.ueEmbb_A[*].app[0].samplingTime  = 0.002s
*.ueUrllc_A[*].app[0].samplingTime = 0.010s
*.ueMmtc_A[*].app[0].samplingTime  = 1s

# Commerce : pic eMBB (événement local, concert, exposition)
*.numEmbbUes_B  = 14
*.numUrllcUes_B = 2
*.numMmtcUes_B  = 1
*.ueEmbb_B[*].app[0].packetSize   = 1400B
*.ueEmbb_B[*].app[0].samplingTime = 0.001s
*.ueUrllc_B[*].app[0].samplingTime = 0.012s
*.ueMmtc_B[*].app[0].samplingTime  = 3s

# Industrie : pic URLLC (changement de quart, synchronisation automates)
*.numEmbbUes_C  = 2
*.numUrllcUes_C = 14
*.numMmtcUes_C  = 8
*.ueEmbb_C[*].app[0].samplingTime  = 0.005s
*.ueUrllc_C[*].app[0].packetSize   = 292B
*.ueUrllc_C[*].app[0].samplingTime = 0.004s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

# ==============================================================================
# GROUPE 5 — SCÉNARIOS DE TRANSITION
# Fondamentaux pour l'apprentissage : le modèle doit prédire la VIOLATION
# avant qu'elle arrive → les transitions sont les échantillons les plus utiles
# ==============================================================================

# ------------------------------------------------------------------------------
# SCÉNARIO 16 : RampUp_Commerce — Montée progressive charge eMBB gNB_Commerce
# ------------------------------------------------------------------------------
# Simule : ouverture progressive d'un événement commercial (soldes, concert)
# Modélisé par : packetSize fixe mais samplingTime décroissant via plusieurs runs
# Note: pour une vraie rampe, utiliser un script shell avec plusieurs configs
# Ici : charge haute représentant le pic après montée complète
# ------------------------------------------------------------------------------
[Config RampUp_Commerce]
description = "Rampe charge eMBB Commerce — stade apres montee (pic representatif)"
sim-time-limit = 1800s

*.numEmbbUes_A  = 4
*.numUrllcUes_A = 4
*.numMmtcUes_A  = 2
*.ueEmbb_A[*].app[0].samplingTime  = 0.002s
*.ueUrllc_A[*].app[0].samplingTime = 0.010s
*.ueMmtc_A[*].app[0].samplingTime  = 1s

*.numEmbbUes_B  = 10    # pic après montée progressive
*.numUrllcUes_B = 3
*.numMmtcUes_B  = 2
*.ueEmbb_B[*].app[0].packetSize   = 1400B
*.ueEmbb_B[*].app[0].samplingTime = 0.0012s  # ~9.3 Mbps/UE → légèrement sous SLA
*.ueUrllc_B[*].app[0].samplingTime = 0.008s
*.ueMmtc_B[*].app[0].samplingTime  = 1s

*.numEmbbUes_C  = 2
*.numUrllcUes_C = 4
*.numMmtcUes_C  = 6
*.ueEmbb_C[*].app[0].samplingTime  = 0.004s
*.ueUrllc_C[*].app[0].samplingTime = 0.010s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

# ------------------------------------------------------------------------------
# SCÉNARIO 17 : FlashCrowd_Macro — Pic soudain sur gNB_Macro (alerte nationale)
# ------------------------------------------------------------------------------
# Simule : alerte météo nationale, annonce gouvernementale → pic instantané
# Tous les UEs résidentiels consultent simultanément (eMBB + mMTC signalisation)
# ------------------------------------------------------------------------------
[Config FlashCrowd_Macro]
description = "Flash crowd Macro — alerte nationale, pic instantane eMBB + mMTC"
sim-time-limit = 1800s

*.numEmbbUes_A  = 16   # pic instantané résidentiel
*.numUrllcUes_A = 6
*.numMmtcUes_A  = 12   # storm signalisation notifications push
*.ueEmbb_A[*].app[0].packetSize   = 1400B
*.ueEmbb_A[*].app[0].samplingTime = 0.001s
