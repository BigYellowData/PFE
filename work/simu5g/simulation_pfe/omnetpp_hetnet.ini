# ==============================================================================
# SCÉNARIO DEMO PFE : ControllerDemo
# Scénario conçu pour démontrer l'efficacité du contrôleur fermé.
#
# Principe : trafic eMBB supérieur à la capacité avec l'allocation par DÉFAUT
# (20 RBs × 0.560 = 11.2 Mbps), mais inférieur à la capacité OPTIMALE du MILP
# (~35 RBs × 0.560 = 19.6 Mbps). Le contrôleur détecte la violation et réalloue.
#
# Attendu :
#   Steps 1-2  : eMBB en violation (latence > 60ms), URLLC/mMTC non affectés
#   Steps 3-4  : LSTM détecte rho(eMBB)>1, MILP donne 35-40 RBs à eMBB
#   Steps 5+   : latence eMBB stabilise et revient sous 60ms → SLA restauré
#
# Budget RB (Macro, R_MAX=50) :
#   Offert eMBB  : 12 UEs × 1.12 Mbps (samplingTime=0.010s) = 13.44 Mbps
#   Défaut       : 20 RBs × 0.560 = 11.2 Mbps  → VIOLATION (+20% surcharge)
#   Optimal MILP : 24 RBs × 0.560 = 13.44 Mbps → RÉSOLU (exact)
#   Reste URLLC  : 50-24-1 = 25 RBs >> 4 UEs × 0.16 Mbps = 0.64 Mbps → OK
#
# Budget RB (Commerce, R_MAX=35) :
#   Offert eMBB  : 8 UEs × 0.56 Mbps (samplingTime=0.020s) = 4.48 Mbps
#   Défaut       : 21 RBs × 0.229 = 4.81 Mbps → légère surcharge avec UE count×
#   Note : Commerce déjà dans SLABoundary — ici le contrôleur maintient l'équilibre
#
# Budget RB (Industrie, R_MAX=25) :
#   Offert eMBB  : 3 UEs × 1.12 Mbps = 3.36 Mbps
#   Défaut       :  6 RBs × 0.400 = 2.40 Mbps → VIOLATION
#   Optimal MILP :  9 RBs × 0.400 = 3.60 Mbps → RÉSOLU
# ==============================================================================
[Config ControllerDemo]
description = "Demo PFE — violation eMBB par surcharge, rectifiee par MILP en 3-5 steps"
sim-time-limit = 300s

# Macro : eMBB 3× plus d'UEs que NormalLoad, même taux par UE → surcharge de 20%
# NormalLoad : 4 UEs × 1.12 Mbps = 4.5 Mbps (40% cap) → OK
# Demo       : 12 UEs × 1.12 Mbps = 13.44 Mbps > 11.2 Mbps DEFAULT → VIOLATION
*.numEmbbUes_A  = 12
*.numUrllcUes_A = 4
*.numMmtcUes_A  = 2
*.ueEmbb_A[*].app[0].samplingTime  = 0.010s   # 1.12 Mbps/UE × 12 = 13.44 Mbps total
*.ueUrllc_A[*].app[0].samplingTime = 0.010s
*.ueMmtc_A[*].app[0].samplingTime  = 1s

# Commerce : eMBB 4 UEs supplémentaires par rapport à NormalLoad (6→10)
# Capacité par défaut : 21 RBs × 0.229 = 4.81 Mbps
# Offert             : 10 UEs × 0.56 Mbps = 5.6 Mbps → surcharge ~15%
*.numEmbbUes_B  = 10
*.numUrllcUes_B = 2
*.numMmtcUes_B  = 1
*.ueEmbb_B[*].app[0].samplingTime  = 0.020s   # 0.56 Mbps/UE × 10 = 5.6 Mbps
*.ueUrllc_B[*].app[0].samplingTime = 0.010s
*.ueMmtc_B[*].app[0].samplingTime  = 2s

# Industrie : eMBB 1 UE supplémentaire par rapport à NormalLoad (2→3)
# Capacité par défaut : 6 RBs × 0.400 = 2.40 Mbps
# Offert             : 3 UEs × 1.12 Mbps = 3.36 Mbps → surcharge 40%
*.numEmbbUes_C  = 3
*.numUrllcUes_C = 4
*.numMmtcUes_C  = 6
*.ueEmbb_C[*].app[0].samplingTime  = 0.010s   # 1.12 Mbps/UE × 3 = 3.36 Mbps
*.ueUrllc_C[*].app[0].samplingTime = 0.010s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

