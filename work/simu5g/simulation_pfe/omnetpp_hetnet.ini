# ==============================================================================
# omnetpp_hetnet.ini
# Configuration simu5G — Réseau HetNet 3 gNodeBs + Architecture MEC
#
# Conformité normative :
#   3GPP TR 38.901 Table 7.2-1  — UMa + UMi deployment parameters
#   3GPP TS 38.423              — Xn interface (inter-gNB)
#   3GPP TS 22.261 §6.22        — Industry 4.0 private 5G
#   ETSI GS MEC 003             — Multi-access Edge Computing
#
# Structure des scénarios (20 configs) :
#   Groupe 1 — Baseline          (2 scénarios)
#   Groupe 2 — Événements réels  (5 scénarios)
#   Groupe 3 — Surcharges ciblées(5 scénarios)
#   Groupe 4 — Hétérogénéité     (4 scénarios)
#   Groupe 5 — Transitions        (4 scénarios)
# ==============================================================================

[General]
network = HetNetSlicing
sim-time-limit = 1800s
seed-set = ${runnumber}

# ------------------------------------------------------------------------------
# ENREGISTREMENT DES RÉSULTATS
# ------------------------------------------------------------------------------
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec
output-scalar-file  = ${resultdir}/${configname}-${runnumber}.sca

# ── Enregistrement des résultats ──────────────────────────────────────────────
# OMNeT++ 6.3 limitation confirmée : les overrides de module/statistique
# spécifiques ne peuvent pas surpasser un setting global (**) pour
# vector-recording ni result-recording-modes.
#
# Solution opérationnelle : activer tous les vecteurs globalement.
# Le script extract_simu5g_metrics.py filtre uniquement les vecteurs CBR
# des serverEmbb/Urllc/Mmtc.app[*] et ignore le reste.
# Fichiers vec : ~19 GB / scénario (1800s) → traiter et supprimer après extraction.
# ─────────────────────────────────────────────────────────────────────────────
**.vector-recording = true
**.scalar-recording = true

# ------------------------------------------------------------------------------
# CONFIGURATION IP ET ROUTAGE
# ------------------------------------------------------------------------------
*.configurator.config = xml("<config> \
  <interface among='gnbMacro gnbCommerce gnbIndustrie iUpf_MEC iUpf_Ind upf router' \
             address='10.x.x.x' netmask='255.255.255.0'/> \
  <interface hosts='*' address='192.168.x.x' netmask='255.255.255.0'/> \
</config>")

# ------------------------------------------------------------------------------
# IDENTIFIANTS DES CELLULES
# Chaque gNodeB a un macCellId unique (utilisé par les UEs pour l'attachement)
# ------------------------------------------------------------------------------
*.gnbMacro.macCellId    = 1
*.gnbMacro.macNodeId    = 1
*.gnbCommerce.macCellId = 2
*.gnbCommerce.macNodeId = 2
*.gnbIndustrie.macCellId = 3
*.gnbIndustrie.macNodeId = 3

# ------------------------------------------------------------------------------
# CONFIGURATION RADIO 5G NR — PARAMÈTRES PAR CELLULE
# Réf: 3GPP TR 38.901 Table 7.2-1
# ------------------------------------------------------------------------------

# Fréquence porteuse (bande n78, 3.5 GHz — déploiements 5G Europe)
*.gnbMacro.cellularNic.phy.carrierFrequency    = 3.5GHz
*.gnbCommerce.cellularNic.phy.carrierFrequency = 3.5GHz
*.gnbIndustrie.cellularNic.phy.carrierFrequency = 3.5GHz

# Resource Blocks par cellule
# UMa (Macro)    : 50 RBs = 100 MHz (3GPP TR 38.101-1, μ=1, n78)
# UMi (Commerce) : 35 RBs =  70 MHz (cellule micro, densité plus faible)
# UMi (Industrie): 25 RBs =  50 MHz (réseau privé, bande dédiée)
*.gnbMacro.cellularNic.**.numBands     = 50
*.gnbCommerce.cellularNic.**.numBands  = 35
*.gnbIndustrie.cellularNic.**.numBands = 25

# Puissance d'émission (3GPP TR 38.901 Table 7.2-1)
# UMa Macro    : 40 dBm (typique 40-46 dBm, antenne secteur)
# UMi Commerce : 30 dBm (typique 30-35 dBm, antenne façade)
# UMi Industrie: 33 dBm (typique 30-35 dBm, antenne intérieure)
*.gnbMacro.**.eNodeBTxPower    = 40dBm
*.gnbCommerce.**.eNodeBTxPower = 30dBm
*.gnbIndustrie.**.eNodeBTxPower = 33dBm
*.*.ueEmbb_A[*].**.ueTxPower   = 26dBm
*.*.ueUrllc_A[*].**.ueTxPower  = 26dBm
*.*.ueMmtc_A[*].**.ueTxPower   = 23dBm
*.*.ueEmbb_B[*].**.ueTxPower   = 23dBm
*.*.ueUrllc_B[*].**.ueTxPower  = 23dBm
*.*.ueMmtc_B[*].**.ueTxPower   = 20dBm
*.*.ueEmbb_C[*].**.ueTxPower   = 23dBm
*.*.ueUrllc_C[*].**.ueTxPower  = 26dBm
*.*.ueMmtc_C[*].**.ueTxPower   = 20dBm

# Scheduler MAC par cellule
# Macro    : MAXCI (meilleure efficacité spectrale, couverture large)
# Commerce : MAXCI (maximiser débit eMBB en zone dense)
# Industrie: PF    (Proportional Fair — équité URLLC + mMTC critique)
*.gnbMacro.cellularNic.mac.schedulingDisciplineDl    = "MAXCI"
*.gnbMacro.cellularNic.mac.schedulingDisciplineUl    = "MAXCI"
*.gnbCommerce.cellularNic.mac.schedulingDisciplineDl = "PF"
*.gnbCommerce.cellularNic.mac.schedulingDisciplineUl = "PF"
*.gnbIndustrie.cellularNic.mac.schedulingDisciplineDl = "PF"
*.gnbIndustrie.cellularNic.mac.schedulingDisciplineUl = "PF"

# Paramètres BLER (Block Error Rate)
**.targetBler = 0.01
**.blerShift  = 5

# MAC buffer (côté gNB, DL) — non limitant pour le trafic UL
**.cellularNic.mac.queueSize = 2800B

# ------------------------------------------------------------------------------
# RLC UM TX BUFFER LIMIT — Indispensable pour obtenir des pertes de paquets mesurables
# Sans cette limite : queueSize = default(2MiB) → latence croît sans borne,
# aucun paquet n'est jamais perdu → SLA latence illisible.
# Avec cette limite : buffer plein → dropBufferOverflow() → pkt_loss_pct exploitable.
# Réf : 3GPP TS 23.501 §5.7.3 — Packet Delay Budget via buffer management
# ------------------------------------------------------------------------------
# eMBB : 1400B/pkt × 1/0.01s = 140kbps/pkt → 15000B ≈ 10 pkts → bounded at ~90ms
*.ueEmbb_*.cellularNic.nrRlc.um.queueSize  = 15000B
# URLLC : 200B/pkt × 1/0.005s = 40kbps/pkt → 8000B ≈ 40 pkts
*.ueUrllc_*.cellularNic.nrRlc.um.queueSize =  8000B
# mMTC : 47B/pkt × 1/1s → très faible débit, peu de pertes attendues
*.ueMmtc_*.cellularNic.nrRlc.um.queueSize  = 10000B

# Activation du slicing QoS
*.gnbMacro.cellularNic.mac.qosHandler.slicing    = true
*.gnbCommerce.cellularNic.mac.qosHandler.slicing = true
*.gnbIndustrie.cellularNic.mac.qosHandler.slicing = true

# Allocation RBs par slice (fichiers XML différents par cellule)
*.gnbMacro.cellularNic.mac.sliceConfig    = xmldoc("sliceConfig_Macro.xml")
*.gnbCommerce.cellularNic.mac.sliceConfig = xmldoc("sliceConfig_Commerce.xml")
*.gnbIndustrie.cellularNic.mac.sliceConfig = xmldoc("sliceConfig_Industrie.xml")

# ------------------------------------------------------------------------------
# MOBILITÉ ET POSITIONS GÉOGRAPHIQUES
# Zone simulée : 1600m × 1200m (quartier urbain)
# ------------------------------------------------------------------------------
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMaxX = 1600m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMaxY = 1200m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initFromDisplayString = false

# Positions des gNodeBs
# Macro : centre géographique (800m, 600m)
*.gnbMacro.mobility.initialX = 800m
*.gnbMacro.mobility.initialY = 600m
# Commerce : quartier commercial nord-ouest (300m, 300m)
*.gnbCommerce.mobility.initialX = 300m
*.gnbCommerce.mobility.initialY = 300m
# Industrie : zone industrielle sud-est (1300m, 850m)
*.gnbIndustrie.mobility.initialX = 1300m
*.gnbIndustrie.mobility.initialY = 850m

# UEs Cellule A (Macro) — distribués dans un rayon de 150m autour du gNB (800m, 600m)
# Rayon réduit (400m→150m) pour assurer un SINR suffisant en UMa et éviter les retransmissions HARQ persistantes
*.ueEmbb_A[*].mobility.initialX  = uniform(650m, 950m)
*.ueEmbb_A[*].mobility.initialY  = uniform(450m, 750m)
*.ueUrllc_A[*].mobility.initialX = uniform(660m, 940m)
*.ueUrllc_A[*].mobility.initialY = uniform(460m, 740m)
*.ueMmtc_A[*].mobility.initialX  = uniform(640m, 960m)
*.ueMmtc_A[*].mobility.initialY  = uniform(440m, 760m)

# UEs Cellule B (Commerce) — clustérisés dans un rayon de 60m autour du gNB (300m, 300m)
*.ueEmbb_B[*].mobility.initialX  = uniform(240m, 360m)
*.ueEmbb_B[*].mobility.initialY  = uniform(240m, 360m)
*.ueUrllc_B[*].mobility.initialX = uniform(250m, 350m)
*.ueUrllc_B[*].mobility.initialY = uniform(250m, 350m)
*.ueMmtc_B[*].mobility.initialX  = uniform(255m, 345m)
*.ueMmtc_B[*].mobility.initialY  = uniform(255m, 345m)

# UEs Cellule C (Industrie) — dans un rayon de 150m autour du gNB (1300m, 850m) — campus fermé
*.ueEmbb_C[*].mobility.initialX  = uniform(1150m, 1450m)
*.ueEmbb_C[*].mobility.initialY  = uniform( 700m, 1000m)
*.ueUrllc_C[*].mobility.initialX = uniform(1160m, 1440m)
*.ueUrllc_C[*].mobility.initialY = uniform( 710m,  990m)
*.ueMmtc_C[*].mobility.initialX  = uniform(1170m, 1430m)
*.ueMmtc_C[*].mobility.initialY  = uniform( 720m,  980m)

# ------------------------------------------------------------------------------
# ATTACHEMENT UE → gNodeB (NR Standalone — 3GPP TS 38.300 §9.2.6)
# macCellId=0 / masterId=0 désactive le LTE legacy
# nrMacCellId = ID du gNodeB servant (1=Macro, 2=Commerce, 3=Industrie)
# ------------------------------------------------------------------------------

# UEs Cellule A → gNB_Macro (cellId=1)
*.ueEmbb_A[*].macCellId = 0
*.ueEmbb_A[*].masterId  = 0
*.ueEmbb_A[*].nrMacCellId = 1
*.ueEmbb_A[*].nrMasterId  = 1
*.ueUrllc_A[*].macCellId = 0
*.ueUrllc_A[*].masterId  = 0
*.ueUrllc_A[*].nrMacCellId = 1
*.ueUrllc_A[*].nrMasterId  = 1
*.ueMmtc_A[*].macCellId = 0
*.ueMmtc_A[*].masterId  = 0
*.ueMmtc_A[*].nrMacCellId = 1
*.ueMmtc_A[*].nrMasterId  = 1

# UEs Cellule B → gNB_Commerce (cellId=2)
*.ueEmbb_B[*].macCellId = 0
*.ueEmbb_B[*].masterId  = 0
*.ueEmbb_B[*].nrMacCellId = 2
*.ueEmbb_B[*].nrMasterId  = 2
*.ueUrllc_B[*].macCellId = 0
*.ueUrllc_B[*].masterId  = 0
*.ueUrllc_B[*].nrMacCellId = 2
*.ueUrllc_B[*].nrMasterId  = 2
*.ueMmtc_B[*].macCellId = 0
*.ueMmtc_B[*].masterId  = 0
*.ueMmtc_B[*].nrMacCellId = 2
*.ueMmtc_B[*].nrMasterId  = 2

# UEs Cellule C → gNB_Industrie (cellId=3)
*.ueEmbb_C[*].macCellId = 0
*.ueEmbb_C[*].masterId  = 0
*.ueEmbb_C[*].nrMacCellId = 3
*.ueEmbb_C[*].nrMasterId  = 3
*.ueUrllc_C[*].macCellId = 0
*.ueUrllc_C[*].masterId  = 0
*.ueUrllc_C[*].nrMacCellId = 3
*.ueUrllc_C[*].nrMasterId  = 3
*.ueMmtc_C[*].macCellId = 0
*.ueMmtc_C[*].masterId  = 0
*.ueMmtc_C[*].nrMacCellId = 3
*.ueMmtc_C[*].nrMasterId  = 3

# ------------------------------------------------------------------------------
# APPLICATIONS CBR (Constant Bit Rate) — CbrSender/CbrReceiver
# Utilisé pour mesurer latence réelle end-to-end (cbrFrameDelay)
# Les 3 cellules partagent les mêmes serveurs applicatifs
# ------------------------------------------------------------------------------

# ── eMBB : Streaming vidéo HD (profil GeForce Now UDP 49005) ──────────────────
# 1400B / 1ms = ~11.2 Mbps/UE (légèrement au-dessus du SLA 10 Mbps → réaliste)
*.ueEmbb_A[*].numApps = 1
*.ueEmbb_A[*].app[0].typename     = "simu5g.apps.cbr.CbrSender"
*.ueEmbb_A[*].app[0].destAddress  = "serverEmbb"
*.ueEmbb_A[*].app[0].destPort     = 49005
*.ueEmbb_A[*].app[0].packetSize   = 1400B
*.ueEmbb_A[*].app[0].samplingTime = 0.001s
*.ueEmbb_A[*].app[0].startTime    = uniform(0s, 1s)
*.ueEmbb_A[*].app[0].finishTime   = 0s

*.ueEmbb_B[*].numApps = 1
*.ueEmbb_B[*].app[0].typename     = "simu5g.apps.cbr.CbrSender"
*.ueEmbb_B[*].app[0].destAddress  = "serverEmbb"
*.ueEmbb_B[*].app[0].destPort     = 49015   # port distinct → CbrReceiver app[1]
*.ueEmbb_B[*].app[0].packetSize   = 1400B
*.ueEmbb_B[*].app[0].samplingTime = 0.001s
*.ueEmbb_B[*].app[0].startTime    = uniform(0s, 1s)
*.ueEmbb_B[*].app[0].finishTime   = 0s

*.ueEmbb_C[*].numApps = 1
*.ueEmbb_C[*].app[0].typename     = "simu5g.apps.cbr.CbrSender"
*.ueEmbb_C[*].app[0].destAddress  = "serverEmbb"
*.ueEmbb_C[*].app[0].destPort     = 49025   # port distinct → CbrReceiver app[2]
*.ueEmbb_C[*].app[0].packetSize   = 1400B
*.ueEmbb_C[*].app[0].samplingTime = 0.002s   # supervision vidéo moins dense
*.ueEmbb_C[*].app[0].startTime    = uniform(0s, 1s)
*.ueEmbb_C[*].app[0].finishTime   = 0s

# 3 apps par serveur — une par cellule (Macro=app[0], Commerce=app[1], Industrie=app[2])
# Permet attribution exacte des mesures cbrFrameDelay par gNB dans extract_simu5g_metrics.py
*.serverEmbb.numApps = 3
*.serverEmbb.app[0].typename   = "simu5g.apps.cbr.CbrReceiver"
*.serverEmbb.app[0].localPort  = 49005   # Cellule A — Macro
*.serverEmbb.app[1].typename   = "simu5g.apps.cbr.CbrReceiver"
*.serverEmbb.app[1].localPort  = 49015   # Cellule B — Commerce
*.serverEmbb.app[2].typename   = "simu5g.apps.cbr.CbrReceiver"
*.serverEmbb.app[2].localPort  = 49025   # Cellule C — Industrie

# ── URLLC : Trafic temps-réel (profil GeForce Now UDP 49003 + industriel) ─────
# 200B / 5ms = 0.32 Mbps/UE (confortable vs SLA 0.5 Mbps → permet surcharge)
*.ueUrllc_A[*].numApps = 1
*.ueUrllc_A[*].app[0].typename     = "simu5g.apps.cbr.CbrSender"
*.ueUrllc_A[*].app[0].destAddress  = "serverUrllc"
*.ueUrllc_A[*].app[0].destPort     = 49003
*.ueUrllc_A[*].app[0].packetSize   = 200B
*.ueUrllc_A[*].app[0].samplingTime = 0.005s
*.ueUrllc_A[*].app[0].startTime    = uniform(0s, 0.5s)
*.ueUrllc_A[*].app[0].finishTime   = 0s

*.ueUrllc_B[*].numApps = 1
*.ueUrllc_B[*].app[0].typename     = "simu5g.apps.cbr.CbrSender"
*.ueUrllc_B[*].app[0].destAddress  = "serverUrllc"
*.ueUrllc_B[*].app[0].destPort     = 49013   # port distinct → CbrReceiver app[1]
*.ueUrllc_B[*].app[0].packetSize   = 200B
*.ueUrllc_B[*].app[0].samplingTime = 0.005s
*.ueUrllc_B[*].app[0].startTime    = uniform(0s, 0.5s)
*.ueUrllc_B[*].app[0].finishTime   = 0s

*.ueUrllc_C[*].numApps = 1
*.ueUrllc_C[*].app[0].typename     = "simu5g.apps.cbr.CbrSender"
*.ueUrllc_C[*].app[0].destAddress  = "serverUrllc"
*.ueUrllc_C[*].app[0].destPort     = 49023   # port distinct → CbrReceiver app[2]
*.ueUrllc_C[*].app[0].packetSize   = 292B   # taille paquets automates industriels
*.ueUrllc_C[*].app[0].samplingTime = 0.005s
*.ueUrllc_C[*].app[0].startTime    = uniform(0s, 0.2s)  # démarrage quasi-synchrone
*.ueUrllc_C[*].app[0].finishTime   = 0s

*.serverUrllc.numApps = 3
*.serverUrllc.app[0].typename   = "simu5g.apps.cbr.CbrReceiver"
*.serverUrllc.app[0].localPort  = 49003   # Cellule A — Macro
*.serverUrllc.app[1].typename   = "simu5g.apps.cbr.CbrReceiver"
*.serverUrllc.app[1].localPort  = 49013   # Cellule B — Commerce
*.serverUrllc.app[2].typename   = "simu5g.apps.cbr.CbrReceiver"
*.serverUrllc.app[2].localPort  = 49023   # Cellule C — Industrie

# ── mMTC : IoT faible volume (profil TCP 443 signalisation + capteurs SCADA) ──
# 47B / 1s = ~0.0004 Mbps/UE (SLA 0.0003 Mbps → confortable en charge normale)
*.ueMmtc_A[*].numApps = 1
*.ueMmtc_A[*].app[0].typename     = "simu5g.apps.cbr.CbrSender"
*.ueMmtc_A[*].app[0].destAddress  = "serverMmtc"
*.ueMmtc_A[*].app[0].destPort     = 8443
*.ueMmtc_A[*].app[0].packetSize   = 47B
*.ueMmtc_A[*].app[0].samplingTime = 1s
*.ueMmtc_A[*].app[0].startTime    = uniform(0s, 5s)
*.ueMmtc_A[*].app[0].finishTime   = 0s

*.ueMmtc_B[*].numApps = 1
*.ueMmtc_B[*].app[0].typename     = "simu5g.apps.cbr.CbrSender"
*.ueMmtc_B[*].app[0].destAddress  = "serverMmtc"
*.ueMmtc_B[*].app[0].destPort     = 8453   # port distinct → CbrReceiver app[1]
*.ueMmtc_B[*].app[0].packetSize   = 47B
*.ueMmtc_B[*].app[0].samplingTime = 2s     # capteurs vitrine moins fréquents
*.ueMmtc_B[*].app[0].startTime    = uniform(0s, 5s)
*.ueMmtc_B[*].app[0].finishTime   = 0s

*.ueMmtc_C[*].numApps = 1
*.ueMmtc_C[*].app[0].typename     = "simu5g.apps.cbr.CbrSender"
*.ueMmtc_C[*].app[0].destAddress  = "serverMmtc"
*.ueMmtc_C[*].app[0].destPort     = 8463   # port distinct → CbrReceiver app[2]
*.ueMmtc_C[*].app[0].packetSize   = 100B   # capteurs SCADA, payloads plus larges
*.ueMmtc_C[*].app[0].samplingTime = 0.5s   # polling fréquent (2 Hz)
*.ueMmtc_C[*].app[0].startTime    = uniform(0s, 2s)
*.ueMmtc_C[*].app[0].finishTime   = 0s

*.serverMmtc.numApps = 3
*.serverMmtc.app[0].typename   = "simu5g.apps.cbr.CbrReceiver"
*.serverMmtc.app[0].localPort  = 8443   # Cellule A — Macro
*.serverMmtc.app[1].typename   = "simu5g.apps.cbr.CbrReceiver"
*.serverMmtc.app[1].localPort  = 8453   # Cellule B — Commerce
*.serverMmtc.app[2].typename   = "simu5g.apps.cbr.CbrReceiver"
*.serverMmtc.app[2].localPort  = 8463   # Cellule C — Industrie


# ==============================================================================
# GROUPE 1 — SCÉNARIOS BASELINE
# ==============================================================================

# ------------------------------------------------------------------------------
# SCÉNARIO 1 : NormalLoad — Charge nominale, tous SLA respectés
# ------------------------------------------------------------------------------
# Dimensionnement (SLA respecté sur les 3 cellules) :
#   Macro    : 4 eMBB (11.2 Mbps tot) + 4 URLLC (0.64 Mbps) + 2 mMTC (0.0004 Mbps)
#   Commerce : 6 eMBB (16.8 Mbps, dans la capacité micro) + 2 URLLC + 1 mMTC
#   Industrie: 2 eMBB (supervision) + 4 URLLC (automates) + 6 mMTC (capteurs)
# Objectif ML : apprendre à NE PAS déclencher d'alerte (classe négative propre)
# ------------------------------------------------------------------------------
[Config NormalLoad]
description = "Charge nominale heterogene — tous SLA respectes sur les 3 cellules"
sim-time-limit = 1800s

# Cellule A (Macro) — profil résidentiel équilibré
# Capacité eMBB Macro : 20 RBs × ~560 kbps/RB ≈ 11.2 Mbps
# 0.010s → 4 UEs × 1.12 Mbps = 4.5 Mbps ≈ 40% capacité (MAXCI safe)
*.numEmbbUes_A  = 4
*.numUrllcUes_A = 4
*.numMmtcUes_A  = 2
*.ueEmbb_A[*].app[0].samplingTime  = 0.010s  # 1.12 Mbps/UE × 4 = 4.5 Mbps (40% cap)
*.ueUrllc_A[*].app[0].samplingTime = 0.010s
*.ueMmtc_A[*].app[0].samplingTime  = 1s

# Cellule B (Commerce) — eMBB dominant mais dans les limites
# Capacité eMBB Commerce : 21 RBs avec 6 UEs ≈ 4.7 Mbps effective (overhead scheduling)
# 0.020s → 6 UEs × 0.56 Mbps = 3.36 Mbps ≈ 70% capacité (confortable)
*.numEmbbUes_B  = 6
*.numUrllcUes_B = 2
*.numMmtcUes_B  = 1
*.ueEmbb_B[*].app[0].samplingTime  = 0.020s  # 0.56 Mbps/UE × 6 = 3.36 Mbps (70% cap)
*.ueUrllc_B[*].app[0].samplingTime = 0.010s
*.ueMmtc_B[*].app[0].samplingTime  = 2s

# Cellule C (Industrie) — URLLC + mMTC nominaux
*.numEmbbUes_C  = 2
*.numUrllcUes_C = 4
*.numMmtcUes_C  = 6
*.ueEmbb_C[*].app[0].samplingTime  = 0.010s
*.ueUrllc_C[*].app[0].samplingTime = 0.010s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

# ------------------------------------------------------------------------------
# SCÉNARIO 2 : LowTrafficNight — Trafic nocturne, mMTC dominant
# ------------------------------------------------------------------------------
# 00h-06h : eMBB quasi-absent, URLLC réduit (urgences seules), mMTC actif
# Utile ML : apprendre que mMTC élevé ≠ violation eMBB/URLLC
# Réf: Trafic mobile nocturne (Sandvine Global Internet Phenomena 2023)
# ------------------------------------------------------------------------------
[Config LowTrafficNight]
description = "Trafic nocturne — mMTC dominant, eMBB minimal, URLLC reduit"
sim-time-limit = 1800s

*.numEmbbUes_A  = 1
*.numUrllcUes_A = 2
*.numMmtcUes_A  = 4
*.ueEmbb_A[*].app[0].samplingTime  = 0.008s  # débit faible
*.ueUrllc_A[*].app[0].samplingTime = 0.020s
*.ueMmtc_A[*].app[0].samplingTime  = 0.5s    # IoT nocturne actif (relevés)

*.numEmbbUes_B  = 1
*.numUrllcUes_B = 1
*.numMmtcUes_B  = 2
*.ueEmbb_B[*].app[0].samplingTime  = 0.010s
*.ueUrllc_B[*].app[0].samplingTime = 0.020s
*.ueMmtc_B[*].app[0].samplingTime  = 1s

*.numEmbbUes_C  = 1
*.numUrllcUes_C = 2
*.numMmtcUes_C  = 8   # capteurs SCADA très actifs la nuit (maintenance préventive)
*.ueEmbb_C[*].app[0].samplingTime  = 0.010s
*.ueUrllc_C[*].app[0].samplingTime = 0.015s
*.ueMmtc_C[*].app[0].samplingTime  = 0.3s   # polling très fréquent

# ==============================================================================
# GROUPE 2 — ÉVÉNEMENTS RÉELS ADAPTÉS AU HETNET
# ==============================================================================

# ------------------------------------------------------------------------------
# SCÉNARIO 3 : FifaWorldCup_Commerce — Finale FIFA, fan zone gNB_Commerce
# ------------------------------------------------------------------------------
# Source: Ooredoo Qatar 2022 — 45.1 TB finale, 2 Gbps pic, 8K streaming
# Adaptation HetNet : le stade / fan zone est près de gNB_Commerce
#   Commerce : saturation eMBB (8K live) + URLLC (VoLTE appels)
#   Macro    : charge élevée (résidentiel suit la retransmission)
#   Industrie: normal (pas d'impact événement sportif)
# Résultat attendu : SLA eMBB violé Commerce + débordement URLLC Macro
# ------------------------------------------------------------------------------
[Config FifaWorldCup_Commerce]
description = "FIFA WC 2022 — Fan zone gNB_Commerce saturee, streaming 8K + VoLTE"
sim-time-limit = 1800s

# Commerce — saturation totale
*.numEmbbUes_B  = 14   # streaming 8K concurrent
*.numUrllcUes_B = 6    # VoLTE appels pendant match
*.numMmtcUes_B  = 2
*.ueEmbb_B[*].app[0].packetSize   = 1400B
*.ueEmbb_B[*].app[0].samplingTime = 0.0008s  # 14 Mbps/UE — dépasse SLA
*.ueUrllc_B[*].app[0].packetSize   = 200B
*.ueUrllc_B[*].app[0].samplingTime = 0.005s
*.ueMmtc_B[*].app[0].samplingTime  = 2s

# Macro — charge élevée (résidentiel suit la retransmission TV)
*.numEmbbUes_A  = 10
*.numUrllcUes_A = 4
*.numMmtcUes_A  = 2
*.ueEmbb_A[*].app[0].packetSize   = 1400B
*.ueEmbb_A[*].app[0].samplingTime = 0.002s  # 5.6 Mbps/UE × 10 → surcharge
*.ueUrllc_A[*].app[0].samplingTime = 0.008s
*.ueMmtc_A[*].app[0].samplingTime  = 1s

# Industrie — non impacté
*.numEmbbUes_C  = 2
*.numUrllcUes_C = 4
*.numMmtcUes_C  = 6
*.ueEmbb_C[*].app[0].samplingTime  = 0.004s
*.ueUrllc_C[*].app[0].samplingTime = 0.010s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

# ------------------------------------------------------------------------------
# SCÉNARIO 4 : KddiOutage_Storm — Storm re-enregistrement VoLTE post-panne
# ------------------------------------------------------------------------------
# Source: KDDI Japan Juillet 2022 — 22.78M terminaux, storm VoLTE, 61h25
# Adaptation HetNet :
#   Macro : storm principal (couverture large = plus d'UEs affectés)
#   Commerce : storm secondaire (zone dense, beaucoup de VoLTE)
#   Industrie: storm IoT (re-enregistrement SCADA + automates)
# Résultat attendu : SLA URLLC violé (Macro + Commerce) + mMTC (Industrie)
# ------------------------------------------------------------------------------
[Config KddiOutage_Storm]
description = "KDDI 2022 — Storm re-enregistrement 22.78M terminaux, 3 cellules impactees"
sim-time-limit = 1800s

# Macro — storm VoLTE principal
*.numEmbbUes_A  = 4
*.numUrllcUes_A = 20
*.numMmtcUes_A  = 6
*.ueEmbb_A[*].app[0].samplingTime  = 0.005s
*.ueUrllc_A[*].app[0].packetSize   = 292B
*.ueUrllc_A[*].app[0].samplingTime = 0.010s  # 3× plus rapide que normal (retransmissions)
*.ueMmtc_A[*].app[0].packetSize    = 47B
*.ueMmtc_A[*].app[0].samplingTime  = 0.5s   # IoT re-enregistrement fréquent

# Commerce — storm VoLTE secondaire (zone dense)
*.numEmbbUes_B  = 4
*.numUrllcUes_B = 12
*.numMmtcUes_B  = 3
*.ueEmbb_B[*].app[0].samplingTime  = 0.006s
*.ueUrllc_B[*].app[0].packetSize   = 292B
*.ueUrllc_B[*].app[0].samplingTime = 0.010s
*.ueMmtc_B[*].app[0].samplingTime  = 1s

# Industrie — re-enregistrement automates + SCADA
*.numEmbbUes_C  = 2
*.numUrllcUes_C = 6
*.numMmtcUes_C  = 10
*.ueEmbb_C[*].app[0].samplingTime  = 0.006s
*.ueUrllc_C[*].app[0].packetSize   = 292B
*.ueUrllc_C[*].app[0].samplingTime = 0.008s
*.ueMmtc_C[*].app[0].packetSize    = 47B
*.ueMmtc_C[*].app[0].samplingTime  = 0.2s  # storm IoT intense

# ------------------------------------------------------------------------------
# SCÉNARIO 5 : SilverScrapes_Gaming — LoL Worlds 2012, congestion gaming
# ------------------------------------------------------------------------------
# Source: LoL Worlds 2012 Q/F — routeur saturé streaming HD + paquets jeu
# Adaptation HetNet :
#   Commerce : peak streaming + gaming (joueurs en déplacement)
#   Macro    : saturation eMBB + URLLC (joueurs résidentiels)
#   Industrie: impact limité (but gaming = données de fond)
# Résultat attendu : SLA eMBB + URLLC violés Commerce et Macro
# ------------------------------------------------------------------------------
[Config SilverScrapes_Gaming]
description = "LoL Worlds 2012 — Congestion streaming HD + paquets jeu, 2 cellules"
sim-time-limit = 1800s

# Commerce — peak gaming (streaming + jeu simultané)
*.numEmbbUes_B  = 12
*.numUrllcUes_B = 14
*.numMmtcUes_B  = 2
*.ueEmbb_B[*].app[0].packetSize   = 1400B
*.ueEmbb_B[*].app[0].samplingTime = 0.001s  # saturation eMBB
*.ueUrllc_B[*].app[0].packetSize  = 100B
*.ueUrllc_B[*].app[0].samplingTime = 0.003s # paquets jeu ultra-fréquents

# Macro — résidentiel gaming (même phénomène, légèrement moins dense)
*.numEmbbUes_A  = 10
*.numUrllcUes_A = 12
*.numMmtcUes_A  = 2
*.ueEmbb_A[*].app[0].packetSize   = 1400B
*.ueEmbb_A[*].app[0].samplingTime = 0.001s
*.ueUrllc_A[*].app[0].packetSize  = 100B
*.ueUrllc_A[*].app[0].samplingTime = 0.003s

# Industrie — non impacté (secteur industriel ≠ gaming)
*.numEmbbUes_C  = 2
*.numUrllcUes_C = 4
*.numMmtcUes_C  = 6
*.ueEmbb_C[*].app[0].samplingTime  = 0.004s
*.ueUrllc_C[*].app[0].samplingTime = 0.010s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

# ------------------------------------------------------------------------------
# SCÉNARIO 6 : ClashLaunch_Sync — Riot 2018, thundering herd synchronisé
# ------------------------------------------------------------------------------
# Source: Riot Games — lancement Clash, millions inscrits simultanément
# Adaptation HetNet :
#   Macro    : storm mMTC (inscriptions) + URLLC (sessions jeu)
#   Commerce : storm mMTC (joueurs en déplacement, inscription mobile)
#   Industrie: non impacté
# Résultat attendu : SLA mMTC violé (Macro + Commerce) + URLLC latence
