# Macro — inscription massives + sessions démarrant
*.numEmbbUes_A  = 4
*.numUrllcUes_A = 14
*.numMmtcUes_A  = 18
*.ueEmbb_A[*].app[0].samplingTime  = 0.005s
*.ueUrllc_A[*].app[0].packetSize   = 200B
*.ueUrllc_A[*].app[0].samplingTime = 0.005s
*.ueMmtc_A[*].app[0].packetSize    = 47B
*.ueMmtc_A[*].app[0].samplingTime  = 0.2s  # burst synchronisé inscriptions

# Commerce — joueurs itinérants qui s'inscrivent
*.numEmbbUes_B  = 3
*.numUrllcUes_B = 8
*.numMmtcUes_B  = 10
*.ueEmbb_B[*].app[0].samplingTime  = 0.008s
*.ueUrllc_B[*].app[0].packetSize   = 200B
*.ueUrllc_B[*].app[0].samplingTime = 0.005s
*.ueMmtc_B[*].app[0].packetSize    = 47B
*.ueMmtc_B[*].app[0].samplingTime  = 0.2s

# Industrie — non impacté
*.numEmbbUes_C  = 2
*.numUrllcUes_C = 4
*.numMmtcUes_C  = 6
*.ueEmbb_C[*].app[0].samplingTime  = 0.004s
*.ueUrllc_C[*].app[0].samplingTime = 0.010s
*.ueMmtc_C[*].app[0].samplingTime  = 0.5s

