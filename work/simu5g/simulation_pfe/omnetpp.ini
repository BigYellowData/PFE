# ==============================================================
# omnetpp.ini - Configuration simu5G pour Network Slicing
# PFE : Prédiction de trafic 5G pour éviter les violations SLA
#
# 3 slices configurés avec QoS différenciée :
#   - eMBB  (SST=1) : Cloud gaming vidéo, haut débit
#   - URLLC (SST=2) : Contrôle temps-réel, faible latence
#   - mMTC  (SST=3) : Signalisation admin, faible volume
#   - Best Effort    : Trafic non classifié
# ==============================================================

[General]
network = NetworkSlicing
sim-time-limit = 300s
seed-set = ${runnumber}

# --- Configuration IP et routage ---
# Configuration identique aux exemples simu5G fonctionnels
*.configurator.config = xml("<config><interface among='gnb iUpf upf router' address='10.x.x.x' netmask='255.255.255.0'/><interface hosts='*' address='192.168.x.x' netmask='255.255.255.0'/></config>")

# --- Enregistrement des resultats ---
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec
output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca

# Desactiver les statistiques problematiques MAC
**.mac.receivedPacketFromLowerLayer.result-recording-modes = -
**.mac.receivedPacketFromUpperLayer.result-recording-modes = -
**.mac.sentPacketToLowerLayer.result-recording-modes = -
**.mac.sentPacketToUpperLayer.result-recording-modes = -

# Activer les metriques importantes pour SLA
**.app[*].**.vector-recording = true
**.app[*].**.scalar-recording = true
**.vector-recording = false
**.scalar-recording = true

# Activer explicitement les metriques CbrReceiver (latence reelle)
**.cbrFrameDelay.vector-recording = true
**.cbrJitter.vector-recording = true
**.cbrFrameLoss.vector-recording = true
**.cbrRcvdPkt.vector-recording = true
**.cbrSentPkt.vector-recording = true
**.cbrGeneratedThroughput.vector-recording = true
**.cbrFrameDelay.result-recording-modes = +vector
**.cbrJitter.result-recording-modes = +vector

# ==============================================================
# CONFIGURATION RADIO 5G NR
# ==============================================================

# Nombre de Resource Blocks
**.numBands = 50

# Puissance de transmission
**.ueTxPower = 26dBm
**.eNodeBTxPower = 40dBm
**.targetBler = 0.01
**.blerShift = 5

# Bande passante 5G NR : 100 MHz en bande n78 (3.5 GHz)
*.gnb.cellularNic.phy.carrierFrequency = 3.5GHz

# Scheduler : Max C/I
*.gnb.cellularNic.mac.schedulingDisciplineDl = "MAXCI"
*.gnb.cellularNic.mac.schedulingDisciplineUl = "MAXCI"

# ==============================================================
# NETWORK SLICING - QoS par slice (3GPP TS 23.501)
# ==============================================================

# ==============================================================
# CONFIGURATION MOBILITÉ ET POSITION
# ==============================================================
**.mobility.constraintAreaMaxX = 1000m
**.mobility.constraintAreaMaxY = 1000m
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initFromDisplayString = false

# Position gNodeB
*.gnb.mobility.initialX = 500m
*.gnb.mobility.initialY = 500m

# Position UEs (autour du gNodeB)
*.ueEmbb[*].mobility.initialX = uniform(400m, 600m)
*.ueEmbb[*].mobility.initialY = uniform(400m, 600m)
*.ueUrllc[*].mobility.initialX = uniform(450m, 550m)
*.ueUrllc[*].mobility.initialY = uniform(450m, 550m)
*.ueMmtc[*].mobility.initialX = uniform(350m, 650m)
*.ueMmtc[*].mobility.initialY = uniform(350m, 650m)
*.ueBestEffort[*].mobility.initialX = uniform(400m, 600m)
*.ueBestEffort[*].mobility.initialY = uniform(400m, 600m)

# ==============================================================
# CONFIGURATION UE - Connexion au gNodeB (NR Standalone)
# ==============================================================
# Pour NR (5G), utiliser nrMacCellId et nrMasterId
# macCellId=0, masterId=0 pour désactiver LTE
# nrMacCellId=1, nrMasterId=1 pour NR

# --- Slice eMBB (SST=1, SD=1) ---
*.gnb.cellularNic.mac.qosHandler.slicing = true
*.ueEmbb[*].macCellId = 0
*.ueEmbb[*].masterId = 0
*.ueEmbb[*].nrMacCellId = 1
*.ueEmbb[*].nrMasterId = 1

# --- Slice URLLC (SST=2, SD=1) ---
*.ueUrllc[*].macCellId = 0
*.ueUrllc[*].masterId = 0
*.ueUrllc[*].nrMacCellId = 1
*.ueUrllc[*].nrMasterId = 1

# --- Slice mMTC (SST=3, SD=1) ---
*.ueMmtc[*].macCellId = 0
*.ueMmtc[*].masterId = 0
*.ueMmtc[*].nrMacCellId = 1
*.ueMmtc[*].nrMasterId = 1

# --- Best Effort ---
*.ueBestEffort[*].macCellId = 0
*.ueBestEffort[*].masterId = 0
*.ueBestEffort[*].nrMacCellId = 1
*.ueBestEffort[*].nrMasterId = 1

# ==============================================================
# ALLOCATION DE RESSOURCES PAR SLICE
# ==============================================================
# Répartition des Resource Blocks (RB) entre slices
# Total : 50 RBs (100 MHz)

*.gnb.cellularNic.mac.sliceConfig = xmldoc("sliceConfig.xml")

# ==============================================================
# APPLICATIONS - CbrSender/CbrReceiver pour mesurer latence réelle
# ==============================================================
# CbrReceiver enregistre: cbrFrameDelay, cbrJitter, cbrFrameLoss

# --- eMBB : Video haute bande passante ---
*.ueEmbb[*].numApps = 1
*.ueEmbb[*].app[0].typename = "simu5g.apps.cbr.CbrSender"
*.ueEmbb[*].app[0].destAddress = "serverEmbb"
*.ueEmbb[*].app[0].destPort = 49005
*.ueEmbb[*].app[0].packetSize = 1400B
*.ueEmbb[*].app[0].samplingTime = 0.001s
*.ueEmbb[*].app[0].startTime = uniform(0s, 1s)
*.ueEmbb[*].app[0].finishTime = 0s

*.serverEmbb.numApps = 1
*.serverEmbb.app[0].typename = "simu5g.apps.cbr.CbrReceiver"
*.serverEmbb.app[0].localPort = 49005

# --- URLLC : Trafic temps-reel faible latence ---
*.ueUrllc[*].numApps = 1
*.ueUrllc[*].app[0].typename = "simu5g.apps.cbr.CbrSender"
*.ueUrllc[*].app[0].destAddress = "serverUrllc"
*.ueUrllc[*].app[0].destPort = 49003
*.ueUrllc[*].app[0].packetSize = 200B
*.ueUrllc[*].app[0].samplingTime = 0.005s
*.ueUrllc[*].app[0].startTime = uniform(0s, 0.5s)
*.ueUrllc[*].app[0].finishTime = 0s

*.serverUrllc.numApps = 1
*.serverUrllc.app[0].typename = "simu5g.apps.cbr.CbrReceiver"
*.serverUrllc.app[0].localPort = 49003

# --- mMTC : Signalisation IoT faible volume ---
*.ueMmtc[*].numApps = 1
*.ueMmtc[*].app[0].typename = "simu5g.apps.cbr.CbrSender"
*.ueMmtc[*].app[0].destAddress = "serverMmtc"
*.ueMmtc[*].app[0].destPort = 8443
*.ueMmtc[*].app[0].packetSize = 100B
*.ueMmtc[*].app[0].samplingTime = 1s
*.ueMmtc[*].app[0].startTime = uniform(0s, 5s)
*.ueMmtc[*].app[0].finishTime = 0s

*.serverMmtc.numApps = 1
*.serverMmtc.app[0].typename = "simu5g.apps.cbr.CbrReceiver"
*.serverMmtc.app[0].localPort = 8443

# --- Best Effort : Trafic non prioritaire ---
*.ueBestEffort[*].numApps = 1
*.ueBestEffort[*].app[0].typename = "simu5g.apps.cbr.CbrSender"
*.ueBestEffort[*].app[0].destAddress = "serverBestEffort"
*.ueBestEffort[*].app[0].destPort = 5000
*.ueBestEffort[*].app[0].packetSize = 512B
*.ueBestEffort[*].app[0].samplingTime = 0.1s
*.ueBestEffort[*].app[0].startTime = uniform(0s, 2s)
*.ueBestEffort[*].app[0].finishTime = 0s

*.serverBestEffort.numApps = 1
*.serverBestEffort.app[0].typename = "simu5g.apps.cbr.CbrReceiver"
*.serverBestEffort.app[0].localPort = 5000

# ==============================================================
# SCENARIOS DE CHARGE (pour générer des violations SLA)
# ==============================================================

# Scénario par défaut : charge normale (4 eMBB, 4 URLLC, 2 mMTC, 2 BE)
[Config Normal]
*.numEmbbUes = 4
*.numUrllcUes = 4
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 1800s
# Paramètres issus des traces GeForce Now
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.0038s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.030s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# Scénario surcharge eMBB : 12 UEs video -> violations SLA eMBB
[Config OverloadEmbb]
*.numEmbbUes = 12
*.numUrllcUes = 4
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 1800s
# Paramètres issus des traces GeForce Now
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.0038s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.030s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# Scénario surcharge URLLC : 12 UEs temps-reel -> violations latence URLLC
[Config OverloadUrllc]
*.numEmbbUes = 4
*.numUrllcUes = 12
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 1800s
# Paramètres issus des traces GeForce Now
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.0038s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.030s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# Scénario mixte : surcharge générale -> violations sur tous les slices
[Config OverloadAll]
*.numEmbbUes = 10
*.numUrllcUes = 10
*.numMmtcUes = 6
*.numBestEffortUes = 6
sim-time-limit = 1800s
# Paramètres issus des traces GeForce Now
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.0038s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.030s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# ==============================================================
# SCENARIO TRAFIC REEL (basé sur 9 fichiers GeForce Now - 62.8M paquets)
# ==============================================================
# Paramètres extraits des traces brutes (PAS de M/M/1)
# Source: GeForce_Now_1.csv à GeForce_Now_9.csv (~7 GB)
#
# Statistiques réelles:
#   eMBB  : 44.3M paquets, 20 flux, 1290 B/pkt, 2.3h durée
#   URLLC : 18.5M paquets, 66 flux, 292 B/pkt, 2.3h durée
#   mMTC  : 744 paquets, 32 flux, 47 B/pkt
#
# Calcul throughput:
#   eMBB  : (44.3M × 1290 × 8) / 8444s = 54 Mbps total, ~2.7 Mbps/flux
#   URLLC : (18.5M × 292 × 8) / 8446s = 5.1 Mbps total, ~0.08 Mbps/flux

[Config RealTraffic]
description = "Trafic basé sur 9 fichiers GeForce Now (62.8M paquets)"
*.numEmbbUes = 4
*.numUrllcUes = 8
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 3600s  # 1 heure

# eMBB : paramètres réels vidéo GeForce Now (1290 B, ~3.8 ms intervalle)
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.0038s  # 3.8 ms

# URLLC : paramètres réels audio/input GeForce Now (292 B, ~30 ms intervalle)
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.030s  # 30 ms

# mMTC : signalisation légère (47 B, rare)
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# ==============================================================
# SCENARIO SURCHARGE REALISTE (basé sur captures + stress)
# ==============================================================
# Même profil que RealTraffic mais avec plus d'UEs pour créer
# de la contention et des violations SLA URLLC

[Config RealTrafficOverload]
description = "Trafic réel avec surcharge pour violations SLA"
*.numEmbbUes = 8
*.numUrllcUes = 20  # 20 UEs URLLC pour créer des violations latence
*.numMmtcUes = 4
*.numBestEffortUes = 4
sim-time-limit = 3600s

# eMBB : paramètres réels + trafic plus intense (CbrSender)
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.002s  # 2 ms (plus intense)

# URLLC : paramètres réels + trafic plus intense pour créer violations
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.010s  # 10 ms (3x plus intense)

# mMTC : signalisation
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 2s

# ==============================================================
# SCENARIOS INTERMEDIAIRES (pour violations partielles 20-60%)
# ==============================================================
# Ces scenarios creent des zones de transition ou les violations
# ne sont ni 0% ni 100%, ce qui force le LSTM a apprendre de
# vrais patterns temporels plutot que juste le type de slice.

# Charge moderee globale : URLLC sous pression (latence ~16-22ms)
[Config MediumLoad]
description = "Charge moderee - URLLC pres du seuil SLA 20ms"
*.numEmbbUes = 6
*.numUrllcUes = 10
*.numMmtcUes = 3
*.numBestEffortUes = 3
sim-time-limit = 1800s
# Parametres issus des traces GeForce Now
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.0038s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.030s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# eMBB pres du seuil : 10 UEs video avec debit 2x plus intense
[Config TransitionEmbb]
description = "eMBB pousse pres du seuil throughput 10 Mbps"
*.numEmbbUes = 10
*.numUrllcUes = 4
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 1800s
# eMBB : sampling 2x plus rapide pour saturer les RBs
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.002s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.030s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# URLLC pres du seuil : 16 UEs avec debit 50% plus rapide
[Config TransitionUrllc]
description = "URLLC pousse pres du seuil latence 20ms"
*.numEmbbUes = 4
*.numUrllcUes = 16
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 1800s
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.0038s
# URLLC : sampling 50% plus rapide pour creer de la contention
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.020s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# ==============================================================
# SCENARIOS DE STRESS eMBB / mMTC
# ==============================================================
# Ces scenarios creent de fortes violations pour eMBB et mMTC.
# eMBB : saturation de la bande passante (throughput < 10 Mbps/UE)
# mMTC : congestion reseau (latence > 10ms SLA)

# Stress eMBB : 20 UEs video a 0.001s -> ~200 Mbps demande, cellule ~80-100 Mbps
# Chaque UE recoit ~4-5 Mbps -> bien sous le seuil SLA de 10 Mbps
[Config StressEmbb]
description = "Saturation eMBB - 20 UEs video haute intensite"
*.numEmbbUes = 20
*.numUrllcUes = 4
*.numMmtcUes = 2
*.numBestEffortUes = 2
sim-time-limit = 1800s
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.001s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.030s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# Stress eMBB modere : 15 UEs video a 0.0015s -> ~100 Mbps demande
# Violations partielles eMBB (throughput ~6-8 Mbps/UE, pres du seuil)
[Config HeavyEmbb]
description = "Surcharge eMBB moderee - 15 UEs, violations partielles"
*.numEmbbUes = 15
*.numUrllcUes = 6
*.numMmtcUes = 3
*.numBestEffortUes = 3
sim-time-limit = 1800s
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.0015s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.030s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 5s

# Congestion elevee : beaucoup d'UEs partout -> stress general
# La congestion pousse la latence mMTC au-dessus de 10ms et degrade eMBB
[Config CongestionHigh]
description = "Congestion forte - stress eMBB + mMTC + URLLC"
*.numEmbbUes = 12
*.numUrllcUes = 15
*.numMmtcUes = 5
*.numBestEffortUes = 5
sim-time-limit = 1800s
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.002s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.015s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 2s

# Charge extreme : toutes les slices saturees simultanement
# Maximum d'UEs + debits eleves -> violations massives sur toutes les slices
[Config ExtremeLoad]
description = "Charge extreme - violations massives toutes slices"
*.numEmbbUes = 18
*.numUrllcUes = 18
*.numMmtcUes = 8
*.numBestEffortUes = 4
sim-time-limit = 1800s
*.ueEmbb[*].app[0].packetSize = 1290B
*.ueEmbb[*].app[0].samplingTime = 0.001s
*.ueUrllc[*].app[0].packetSize = 292B
*.ueUrllc[*].app[0].samplingTime = 0.010s
*.ueMmtc[*].app[0].packetSize = 47B
*.ueMmtc[*].app[0].samplingTime = 1s
